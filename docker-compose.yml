services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "4242:4242"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app_db
      REDIS_HOST: redis
      REDIS_PORT: 6379

  worker:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run worker"
    depends_on:
      - redis
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app_db
      REDIS_HOST: redis
      REDIS_PORT: 6379

volumes:
  pgdata: